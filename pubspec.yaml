name: interflex
description: A super secure international money transfer and payment application.
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_secure_storage: ^10.2.0
  dio: ^5.4.0
  provider: ^6.1.1
  intl: ^0.20.2
  google_fonts: ^8.1.0
  pinput: ^6.0.2
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2
  local_auth: ^3.0.1
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  crypto: ^3.0.3
  flutterwave_standard: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - uploads/
